services:
  - type: web
    name: careertrack-ai-backend
    env: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: MONGO_URI
        sync: false
      - key: PORT
        value: 10000
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_REGISTRATION_CODE
        sync: false
      - key: FRONTEND_URL
        sync: false
